<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SRV am Ernst-Kalkuhl-Gymnasium</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        .animate-fadeIn { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { 
            from { opacity: 0; transform: translateY(10px); } 
            to { opacity: 1; transform: translateY(0); } 
        }
        /* Verstecke Abschnitte standardmäßig, die nicht 'home' sind */
        .page-section { display: none; }
        .page-section.active { display: block; }
    </style>
</head>
<body class="min-h-screen flex flex-col bg-white font-sans text-gray-800 selection:bg-green-200">

    <nav class="sticky top-0 w-full z-50 bg-green-800 text-white shadow-md">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-20">
                <div class="flex items-center cursor-pointer group" onclick="navigateTo('home')">
                    <svg viewBox="0 0 400 300" class="h-16 w-24 mr-3 drop-shadow-sm group-hover:scale-105 transition-transform" xmlns="http://www.w3.org/2000/svg">
                        <defs>
                            <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
                                <feDropShadow dx="2" dy="4" stdDeviation="3" flood-opacity="0.6" flood-color="#000000" />
                            </filter>
                        </defs>
                        <line x1="100" y1="240" x2="280" y2="60" stroke="#111" stroke-width="12" stroke-linecap="round" filter="url(#shadow)" />
                        <path d="M 275 65 L 305 20 Q 330 30 335 55 L 290 95 Z" fill="#ffffff" stroke="#e0e0e0" stroke-width="2" filter="url(#shadow)" />
                        <line x1="300" y1="240" x2="120" y2="60" stroke="#111" stroke-width="12" stroke-linecap="round" filter="url(#shadow)" />
                        <path d="M 125 65 L 95 20 Q 70 30 65 55 L 110 95 Z" fill="#ffffff" stroke="#e0e0e0" stroke-width="2" filter="url(#shadow)" />
                        <text x="200" y="170" font-family="'Comic Sans MS', 'Chalkboard SE', 'Marker Felt', sans-serif" font-size="130" fill="#ffffff" text-anchor="middle" filter="url(#shadow)">SRV</text>
                        <text x="200" y="240" font-family="'Comic Sans MS', 'Chalkboard SE', 'Marker Felt', sans-serif" font-size="26" fill="#ffffff" text-anchor="middle" filter="url(#shadow)">ERNST-KALKUHL GYMNASIUM</text>
                        <text x="200" y="275" font-family="'Comic Sans MS', 'Chalkboard SE', 'Marker Felt', sans-serif" font-size="28" fill="#ffffff" text-anchor="middle" filter="url(#shadow)">BONN</text>
                    </svg>
                </div>
                
                <div class="hidden lg:flex space-x-2 items-center">
                    <button onclick="navigateTo('home')" data-target="home" class="nav-link px-3 py-2 rounded-md transition-colors font-medium bg-green-900 text-white shadow-inner">Startseite</button>
